<!DOCTYPE html>

<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (~{::body},'home')}"
>
  <body>
    <div class="d-flex align-items-center flex-wrap gap-2">
      <h2 class="mb-0" th:text="#{welcome}">Welcome!</h2>
      <span id="welcome-clock" class="h5 mb-0 text-primary" aria-live="polite">--:--:--</span>
    </div>
    <div class="row">
      <div class="col-md-12">
        <img
          class="img-responsive"
          src="../static/resources/images/pets.png"
          th:src="@{/resources/images/pets.png}"
        />
      </div>
    </div>
    <script>
      (() => {
        const clockElement = document.getElementById("welcome-clock");
        if (!clockElement) {
          return;
        }

        const updateClock = () => {
          const now = new Date();
          const dateText = now.toLocaleDateString("zh-TW", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit"
          });
          const timeText = now.toLocaleTimeString("zh-TW", { hour12: false });
          clockElement.textContent = `${dateText} ${timeText}`;
        };

        updateClock();
        window.setInterval(updateClock, 1000);
      })();
    </script>
  </body>
</html>
